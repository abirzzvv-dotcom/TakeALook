<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ayadz lowk tuff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div id="card">
  <div class="banner"></div>
  <div class="body">
    <div class="left-col">
      <div class="avatar-wrap">
        <div class="avatar-ring">
          <div class="avatar-img" id="avatarImg">
            <span class="avatar-initials" id="avatarInitials"></span>
          </div>
        </div>
        <div class="status-dot" id="statusDot"></div>
      </div>
      <div class="name-block">
        <div>
          <span class="username" id="uname"></span>
          <span class="handle" id="handle"></span>
        </div>
        <div class="tagline" id="tagline"></div>
      </div>
      <div class="bio-box">
        <div class="bio-content">
          <div class="bio-name" id="bioName"></div>
          <div class="bio-desc" id="bioDesc"></div>
        </div>
        <div class="badges-row" id="badgesRow">
          <span class="badges-label">Badges</span>
        </div>
      </div>
    </div>
    <div class="right-col">
      <div class="tabs" id="tabs"></div>
      <div class="list" id="list"></div>
    </div>
  </div>
</div>

<script src="./script.js"></script>
</body>
</html>
